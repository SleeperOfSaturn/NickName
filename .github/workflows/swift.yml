name: iOS Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Verify toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build & Test
        run: |
          xcodebuild \
            -scheme NickName \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO \
            test