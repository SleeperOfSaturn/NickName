name: iOS Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Swift 6.2
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"

      - name: Show versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build & Test
        run: |
          xcodebuild \
            -scheme NickName \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            test \
            CODE_SIGNING_ALLOWED=NO
